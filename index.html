<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Jagdamba - Final Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-grad: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c);
            --gold-glow: 0 0 20px rgba(191, 149, 63, 0.7);
            --dark-box: #0a0a0a;
            --border-color: #1a1a1a;
        }

        body { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            background: #000; 
            color: white; 
            padding-bottom: 150px; 
            overflow-x: hidden; 
        }
        
        .glow-text { 
            background: var(--gold-grad); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 900; 
        }

        .banner-header { 
            text-align: center; 
            padding: 45px 15px; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=800'); 
            background-size: cover; 
            border-bottom: 3px solid #bf953f; 
            border-radius: 0 0 30px 30px;
        }
        .main-title { font-family: 'Cinzel', serif; font-size: 30px; margin: 0; }

        .cat-container { display: flex; align-items: center; padding: 15px; gap: 12px; position: sticky; top: 0; background: #000; z-index: 1000; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ff3333; transition: .4s; border-radius: 34px; border: 1px solid #444; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00c853; border-color: #222; }
        input:checked + .slider:before { transform: translateX(24px); }

        .cat-scroll { display: flex; overflow-x: auto; gap: 10px; flex: 1; scrollbar-width: none; }
        .chip { background: #111; padding: 10px 20px; border-radius: 30px; border: 1px solid #333; color: #aaa; font-weight: 800; white-space: nowrap; font-size: 13px; }
        .chip.active { background: var(--gold-grad); color: #000; border: none; box-shadow: var(--gold-glow); font-weight: 900; }

        .item-card { 
            display: flex; 
            background: var(--dark-box); 
            margin: 12px 15px; 
            border-radius: 18px; 
            border: 1px solid var(--border-color); 
            padding: 15px; 
            align-items: center; 
            transition: all 0.3s ease-out; 
        }
        .item-card.highlight { 
            transform: scale(1.04); 
            background: #111;
            border: 1.5px solid #bf953f; 
            box-shadow: var(--gold-glow); 
        }
        
        .item-img { width: 75px; height: 75px; border-radius: 12px; object-fit: cover; border: 1.5px solid #333; }
        .item-info { flex: 1; margin-left: 15px; }
        .item-type-sign { width: 14px; height: 14px; border: 1px solid white; display: inline-flex; align-items: center; justify-content: center; margin-right: 6px; border-radius: 3px; }
        .item-type-sign div { width: 7px; height: 7px; }
        .item-name { font-weight: 800; font-size: 16px; margin-bottom: 3px; }
        .item-desc { font-size: 11px; color: #888; margin-bottom: 5px; }
        .item-price { color: #fcf6ba; font-weight: 900; font-size: 18px; }

        .qty-box { display: flex; gap: 14px; font-weight: 900; color: #fcf6ba; font-size: 18px; align-items: center; }
        .qty-box span { font-size: 26px; cursor: pointer; color: #fff; }

        .request-box { background: var(--dark-box); margin: 25px 15px; padding: 22px; border-radius: 20px; border: 1.5px solid #bf953f; text-align: center; box-shadow: var(--gold-glow); }
        .floating-call { background: var(--gold-grad); padding: 16px; border-radius: 50px; text-decoration: none; color: #000; font-weight: 900; margin: 0 15px 25px 15px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: var(--gold-glow); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .cart-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--gold-grad); height: 65px; border-radius: 18px; display: none; align-items: center; justify-content: space-between; padding: 0 25px; color: #000; font-weight: 900; z-index: 2000; animation: cartPulse 1.5s infinite; }
        @keyframes cartPulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); }
        .modal-content { background: #080808; margin: 10% auto; padding: 30px 25px; border-radius: 25px; width: 85%; border: 2px solid #bf953f; text-align: center; }
        .modal-input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1.5px solid #333; background: #000; color: #fff; box-sizing: border-box; font-family: 'Montserrat'; font-weight: 600; }
        
        .pay-options { display: flex; gap: 15px; margin-top: 20px; }
        .pay-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; box-shadow: var(--gold-glow); background: var(--gold-grad); color: #000; }
        .pay-btn span { font-weight: 900; font-size: 16px; }
        .pay-btn small { font-weight: 700; font-size: 11px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="banner-header">
        <h1 class="main-title glow-text">HOTEL JAGDAMBA</h1>
        <p style="letter-spacing: 4px; color:#fcf6ba; font-size:11px; margin:6px 0; font-weight:800;">DHABA & RESTAURANT</p>
    </div>

    <div class="cat-container">
        <label class="switch"><input type="checkbox" id="vegToggle" checked onchange="renderMenu()"><span class="slider"></span></label>
        <div class="cat-scroll" id="catScroll"></div>
    </div>

    <div id="menuDisplay"></div>

    <div class="request-box">
        <h3 class="glow-text" style="margin:0;">👑 Any Special Request?</h3>
    </div>

    <a href="tel:918377996928" class="floating-call">
        <span style="background:#000; color:#fff; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;">📞</span>
        <span>Connect to Hotel Jagdamba Dhaba & Restaurant</span>
    </a>

    <div class="cart-bar" id="cartBar" onclick="openOrderModal()">
        <div style="display:flex; align-items:center; gap:10px;">🛒 <span id="cartCount">0 Items</span></div>
        <div id="cartTotal">₹0</div>
        <div>Confirm Order ➔</div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h2 class="glow-text">Finalize Order</h2>
            <input type="text" id="custName" class="modal-input" placeholder="आपका नाम">
            <select id="orderMode" class="modal-input" onchange="updatePlaceholder()">
                <option value="Dining">Dining 🍽️</option>
                <option value="Home Delivery">Home Delivery 🚚</option>
            </select>
            <input type="text" id="custInfo" class="modal-input" placeholder="टेबल नंबर">
            
            <div class="pay-options">
                <div class="pay-btn" onclick="processOrder('ONLINE')"><span>ONLINE 💳</span><small>Pay via UPI</small></div>
                <div class="pay-btn" onclick="processOrder('COD')"><span>CASH 💵</span><small>Pay Later</small></div>
            </div>
            
            <button onclick="closeModal()" style="background:transparent; color:#888; border:none; margin-top:20px; cursor:pointer;">← Back to Menu</button>
        </div>
    </div>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/1oHvoI-9h5rkgcrmlrSXAIO05UxIRBHwhDT2bMtUSMKo/export?format=csv";
        const UPI_ID = "Q334332463@ybl"; // आपकी UPI ID
        let menuItems = [], cart = {}, currentFilter = "ALL";

        async function loadMenu() {
            const resp = await fetch(sheetURL);
            const data = await resp.text();
            const rows = data.split("\n").slice(1);
            const cats = new Set(["ALL"]);
            menuItems = rows.filter(r => r.trim()).map((r, i) => {
                const cols = r.split(",");
                const p = parseInt(cols[1]);
                cats.add(cols[2]?.trim().toUpperCase());
                return { id: i, name: cols[0], price: isNaN(p) ? 0 : p, cat: cols[2]?.trim().toUpperCase(), type: cols[3]?.toLowerCase().includes("non") ? "nonveg" : "veg", desc: cols[4] || "Delicious freshly prepared dish.", img: cols[5] || 'https://via.placeholder.com/100' };
            });
            const scroll = document.getElementById("catScroll");
            Array.from(cats).forEach(c => scroll.innerHTML += `<div class="chip ${c==='ALL'?'active':''}" onclick="filterCat('${c}', this)">${c}</div>`);
            renderMenu();
            initScrollHighlight();
        }

        function renderMenu() {
            const isVeg = document.getElementById("vegToggle").checked;
            const type = isVeg ? "veg" : "nonveg";
            let html = "", list = menuItems.filter(i => (currentFilter === "ALL" || i.cat === currentFilter) && i.type === type);
            list.forEach(i => {
                const q = cart[i.id] || 0;
                const color = i.type === "veg" ? "#00c853" : "#ff3333";
                html += `<div class="item-card js-item-card"><img src="${i.img}" class="item-img"><div class="item-info"><div class="item-name"><div class="item-type-sign" style="border-color:${color}"><div style="background:${color}"></div></div>${i.name}</div><div class="item-desc">${i.desc}</div><div class="item-price">${i.price === 0 ? 'MRP' : '₹'+i.price}</div></div>${q > 0 ? `<div class="qty-box"><span onclick="updateQty(${i.id},-1)">−</span>${q}<span onclick="updateQty(${i.id},1)">+</span></div>` : `<button class="chip active" onclick="updateQty(${i.id},1)">ADD</button>`}</div>`;
            });
            document.getElementById("menuDisplay").innerHTML = html;
        }

        function initScrollHighlight() {
            window.addEventListener('scroll', () => {
                const cards = document.querySelectorAll('.js-item-card');
                const centerY = window.innerHeight / 2.5;
                cards.forEach(card => {
                    const rect = card.getBoundingClientRect();
                    if (rect.top <= centerY && rect.bottom >= centerY) card.classList.add('highlight');
                    else card.classList.remove('highlight');
                });
            });
        }

        function updateQty(id, val) {
            cart[id] = (cart[id] || 0) + val; if(cart[id] <= 0) delete cart[id];
            let total = 0, count = 0; menuItems.forEach(i => { if(cart[i.id]) { total += i.price * cart[i.id]; count += cart[i.id]; } });
            document.getElementById("cartBar").style.display = count > 0 ? "flex" : "none";
            document.getElementById("cartCount").innerText = count + " Items";
            document.getElementById("cartTotal").innerText = "₹" + total;
            renderMenu();
        }

        function filterCat(c, el) { currentFilter = c; document.querySelectorAll('.chip').forEach(x => x.classList.remove('active')); el.classList.add('active'); renderMenu(); }
        function openOrderModal() { document.getElementById("orderModal").style.display = "block"; }
        function closeModal() { document.getElementById("orderModal").style.display = "none"; }
        function updatePlaceholder() { document.getElementById('custInfo').placeholder = document.getElementById('orderMode').value === "Dining" ? "टेबल नंबर" : "पूरा पता"; }

        function processOrder(pType) {
            const name = document.getElementById("custName").value, info = document.getElementById("custInfo").value, mode = document.getElementById("orderMode").value;
            if(!name || !info) return alert("विवरण भरें!");
            
            let itemsMsg = "", total = 0;
            menuItems.forEach(i => { if(cart[i.id]) { itemsMsg += `${i.type==='veg'?'🟢':'🔴'} ${i.name} ×${cart[i.id]} ➜ ₹${i.price*cart[i.id]}%0A`; total += i.price*cart[i.id]; }});
            
            if(pType === 'ONLINE') {
                // सीधे पेमेंट एप खोलने के लिए UPI लिंक
                const upiLink = `upi://pay?pa=${UPI_ID}&pn=Jagdamba&am=${total}&cu=INR`;
                window.location.href = upiLink;
                // थोड़े समय बाद व्हाट्सएप पर मैसेज भेजें
                setTimeout(() => sendToWA(name, mode, info, itemsMsg, total, "✅ Online (Paid)"), 2000);
            } else {
                sendToWA(name, mode, info, itemsMsg, total, "⌛ COD (Pending)");
            }
        }

        function sendToWA(name, mode, info, itemsMsg, total, pStat) {
            const waMsg = `🍽️✨ *नया डिजिटल ऑर्डर प्राप्त हुआ* ✨🍽️%0A━━━━━━━━━━━━━━━━━━━━━━%0A🏨 *होटल जगदंबा ढाबा एंड रेस्टोरेंट*%0A🥘 *स्वाद भी • सेवा भी • विश्वास भी*%0A%0A👤 *ग्राहक नाम:* ${name}%0A🍴 *ऑर्डर प्रकार:* ${mode}%0A📍 *विवरण:* ${info}%0A%0A📋 *ऑर्डर विवरण:*%0A${itemsMsg}━━━━━━━━━━━━━━━━━━━━━━%0A💵 *कुल बिल: ₹${total}* (Plus MRP Items)%0A💳 *पेमेंट स्टेटस: ${pStat}*%0A%0A🧾 *ऑर्डर तैयार किया जा रहा है...*%0A🙏 *कृपया प्रतीक्षा करें*%0A%0A━━━━━━━━━━━━━━━━━━━━━━%0A❤️ *धन्यवाद!*%0A*फिर से सेवा का मौका दीजिए* 😊`;
            window.open(`https://wa.me/918377996928?text=${waMsg}`);
            closeModal();
        }

        loadMenu();
    </script>
</body>
</html>
